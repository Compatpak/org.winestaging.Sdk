  # Alternative NVAPI implementation for use on top of DXVK and VKD3D-Proton (enables things like NVIDIA DLSS, Reflex, Physx, etc)
  # Note: This module just places the DXVK-NVAPI dlls and reflex layer in ${FLATPAK_DEST}/share/dxvk-nvapi/ and child Apps will have to copy/replace the default Wine dlls with these to make use of DXVK-NVAPI
  - name: dxvk-nvapi
    sources:
      - type: archive
        url: https://github.com/jp7677/dxvk-nvapi/releases/download/v0.9.2/dxvk-nvapi-v0.9.2.tar.gz
        sha256: 60c284223530d643c446c263f1e1a96c6de7b5ff21796219646da734d97a70d6
