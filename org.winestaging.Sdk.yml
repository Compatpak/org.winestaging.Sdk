  # Note: This module just places the D7VK ddraw.dll in ${FLATPAK_DEST}/share/d7vk/ and child Apps will have to copy/replace the default Wine ddraw.dll with this to make use of D7VK
  - name: d7vk
    sources:
      - type: archive
        url: https://github.com/WinterSnowfall/d7vk/releases/download/v1.11/d7vk-v1.11.zip
        sha256: 158283fd299ab73bcb38733d31f49c5f7a9187d22ab81f48db881fbd96c969fb
