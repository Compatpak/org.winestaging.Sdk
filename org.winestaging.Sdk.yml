          version-pattern: /WinterSnowfall/d7vk/releases/tag/v(\d[\d\.]+\d)                                   # Search for this regex pattern
          url-template: https://github.com/WinterSnowfall/d7vk/releases/download/v$version/d7vk-v$version.zip # Compare this file (found using regex match from above) to the source to see if there is a newer version

      # Script that switches a Wine prefix to the default Wine ddraw.dll instead of D7VK ddraw.dll (Optionally ran by child Apps to update their already initialized Wine prefix)
      - type: file
        path: Scripts/D7VKToWine.sh

      # Script that switches a Wine prefix to the D7VK ddraw.dll instead of default Wine ddraw.dll (Optionally ran by child Apps to update their already initialized Wine prefix)
      - type: file
        path: Scripts/WineToD7VK.sh
    buildsystem: simple
    build-commands:
      - |
        mkdir -p ${FLATPAK_DEST}/share/d7vk/                 # Make directory path for D7VK
        cp -a x32 ${FLATPAK_DEST}/share/d7vk/                # Copy 32bit D7VK keeping file permissions the same

        install -Dm755 D7VKToWine.sh -t ${FLATPAK_DEST}/bin/ # Install script for switching Wine prefix to default Wine instead of D7VK
        install -Dm755 WineToD7VK.sh -t ${FLATPAK_DEST}/bin/ # Install script for switching Wine prefix to D7VK instead of default Wine

